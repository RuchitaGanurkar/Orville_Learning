version: '3.3'

services:
  db:
    image: postgres:16.3
    environment:
      POSTGRES_USER: ruchita
      POSTGRES_PASSWORD: qwerty
      POSTGRES_DB: orville_project
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ruchita
      POSTGRES_PASS: qwerty
      POSTGRES_DB: orville_project
    ports:
      - "3000:3000"
    volumes:
      - .:/app/.stack-work/install/x86_64-linux-tinfo6-libc6-pre232"
    command: ["stack", "exec", "OrvilleProject-exe"]

volumes:
  db-data:
